name: Build and deploy ASP.Net Core app to Azure Web App - as-backend-api

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore backend/KintaiApi/KintaiApi.csproj

      - name: Build with dotnet
        run: dotnet build backend/KintaiApi/KintaiApi.csproj --configuration Release --no-restore

      - name: dotnet publish
        run: dotnet publish backend/KintaiApi/KintaiApi.csproj -c Release -o ${{env.DOTNET_ROOT}}/myapp

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_598E7E520F5949F0A7DE04A2CCD4DFC2 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_9D88C6D0392646A0A6C8EC980A44DA4D }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_AF4C8033AD4346F4A98F4EC0A31D660D }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'as-backend-api'
          slot-name: 'Production'
          package: .
